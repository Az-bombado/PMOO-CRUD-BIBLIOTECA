<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>

    <link rel="stylesheet" href="/css/home/home.css">
</head>
<body>

<header class="topbar">

    <div class="logo">
        Biblioteca
    </div>

    <nav class="menu">

        <a href="/home">Home</a>
        <a href="/livros">Livros</a>
        <a href="/usuarios">Usuários</a>
        <a href="/logout" class="logout">
            Sair
        </a>

    </nav>

</header>

<main class="container">

    <section class="hero">

        <div class="hero-text">

            <h1>
                Sistema de Biblioteca
            </h1>

            <p>
                Gerencie livros, usuários e empréstimos
                em um ambiente moderno e organizado.
            </p>

            <div class="buttons">

                <a href="/livros">
                    Ver Livros
                </a>

                <a href="/cadastro">
                    Novo Usuário
                </a>

            </div>

        </div>

        <div class="hero-card">

            <div class="card">

                <h2>
                    Estatísticas
                </h2>

                <div class="stats">

                    <div>
                        <span>120</span>
                        <p>Livros</p>
                    </div>

                    <div>
                        <span>48</span>
                        <p>Usuários</p>
                    </div>

                    <div>
                        <span>17</span>
                        <p>Empréstimos</p>
                    </div>

                </div>

            </div>

        </div>

    </section>

</main>

<script src="/js/home/home.js"></script>
</body>
</html>
