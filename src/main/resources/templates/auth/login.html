<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="/css/auth/auth.css">
</head>
<body>

<div class="container">

    <form action="/login" method="post" class="form">

        <h1>Login</h1>

        <input
                type="email"
                name="email"
                placeholder="Email"
                required
        >

        <input
                type="password"
                name="senha"
                placeholder="Senha"
                required
        >

        <button type="submit">
            Entrar
        </button>

        <p>
            Não possui conta?
            <a href="/cadastro">
                Cadastre-se
            </a>
        </p>

    </form>

</div>

<script src="/js/auth/auth.js"></script>
</body>
</html>
